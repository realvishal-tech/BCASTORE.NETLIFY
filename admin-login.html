<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin Login - BCA STORE Classroom Admin" />
  
  <title>Admin Login | BCA STORE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --dark: #0f172a;
      --darker: #020617;
      --light: #f1f5f9;
      --border: #334155;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a1f35 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background orbs */
    .auth-orb {
      position: fixed;
      border-radius: 50%;
      mix-blend-mode: screen;
      opacity: 0.15;
      pointer-events: none;
    }

    .orb1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #6366f1, transparent);
      top: 10%;
      left: -10%;
      animation: float 8s ease-in-out infinite;
    }

    .orb2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #ec4899, transparent);
      bottom: 10%;
      right: 5%;
      animation: float 10s ease-in-out infinite 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(50px); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      padding: 2rem;
    }

    .login-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
      border: 1px solid rgba(100, 116, 139, 0.2);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .login-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-weight: 600;
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    .form-group input {
      padding: 0.85rem 1rem;
      background: rgba(100, 116, 139, 0.1);
      border: 1px solid rgba(100, 116, 139, 0.3);
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      background: rgba(100, 116, 139, 0.2);
      border-color: #6366f1;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    }

    .form-group input::placeholder {
      color: #94a3b8;
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .remember-forgot a {
      color: #6366f1;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .remember-forgot a:hover {
      color: #ec4899;
    }

    .remember-forgot label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #cbd5e1;
      cursor: pointer;
    }

    .remember-forgot input[type="checkbox"] {
      cursor: pointer;
    }

    .login-button {
      padding: 1rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
    }

    .login-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
    }

    .login-button:active {
      transform: translateY(-1px);
    }

    .login-button.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .divider {
      text-align: center;
      color: #94a3b8;
      position: relative;
      margin: 1.5rem 0;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: rgba(100, 116, 139, 0.2);
      z-index: -1;
    }

    .divider span {
      background: linear-gradient(135deg, #0f172a 0%, #1a1f35 50%, #0f172a 100%);
      padding: 0 1rem;
    }

    .demo-button {
      padding: 0.75rem;
      background: transparent;
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #6366f1;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .demo-button:hover {
      background: rgba(99, 102, 241, 0.15);
      border-color: #6366f1;
      color: #6366f1;
    }

    .notification {
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      display: none;
      animation: slideInDown 0.3s ease;
      text-align: center;
      font-weight: 500;
    }

    .notification.show {
      display: block;
    }

    .notification.success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      color: #22c55e;
    }

    .notification.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .notification.info {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    .security-note {
      background: rgba(59, 130, 246, 0.1);
      border-left: 3px solid #3b82f6;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 2rem;
      color: #cbd5e1;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .security-note strong {
      color: #3b82f6;
      display: block;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 1rem;
      }

      .login-card {
        padding: 1.5rem;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background Orbs -->
  <div class="auth-orb orb1"></div>
  <div class="auth-orb orb2"></div>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <span class="login-icon">🔐</span>
        <h1>Admin Access</h1>
        <p>Manage Live Classes & Students</p>
      </div>

      <!-- Notification -->
      <div id="loginNotification" class="notification"></div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="adminEmail">Admin Email</label>
          <input 
            type="email" 
            id="adminEmail" 
            placeholder="admin@bcastore.edu"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input 
            type="password" 
            id="adminPassword" 
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="remember-forgot">
          <label>
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
          <a href="#" onclick="resetPassword(event)">Forgot password?</a>
        </div>

        <button type="submit" class="login-button" id="loginBtn">
          Sign in to Dashboard
        </button>
      </form>

      <!-- Demo Access -->
      <div class="divider">
        <span>Demo Access</span>
      </div>

      <button type="button" class="demo-button" onclick="useDemoCredentials()">
        🎯 Use Demo Credentials
      </button>

      <!-- Security Note -->
      <div class="security-note">
        <strong>Demo Credentials Available</strong>
        Click "Use Demo Credentials" or enter:<br>
        📧 admin@bcastore.edu / 🔒 admin123
      </div>

      <!-- Footer -->
      <div class="login-footer">
        <p>© 2024 BCA STORE. All rights reserved.</p>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script>
    /**
     * Handle login form submission
     */
    function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      
      // Simple validation (In production, use proper authentication)
      const validAdmins = [
        { email: 'admin@bcastore.edu', password: 'admin123' },
        { email: 'principal@bca.edu', password: 'principle123' }
      ];
      
      const admin = validAdmins.find(a => a.email === email && a.password === password);
      
      if (!admin) {
        showLoginNotification('Invalid email or password', 'error');
        return;
      }
      
      // Show loading state
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.textContent = 'Signing in...';
      
      // Simulate authentication delay
      setTimeout(() => {
        // Save credentials
        localStorage.setItem('adminToken', 'valid-token-' + Date.now());
        localStorage.setItem('adminEmail', email);
        
        if (rememberMe) {
          localStorage.setItem('rememberEmail', email);
        }
        
        showLoginNotification('✅ Login successful! Redirecting...', 'success');
        
        setTimeout(() => {
          window.location.href = 'admin-classroom.html';
        }, 1000);
      }, 800);
    }

    /**
     * Use demo credentials
     */
    function useDemoCredentials() {
      document.getElementById('adminEmail').value = 'admin@bcastore.edu';
      document.getElementById('adminPassword').value = 'admin123';
      document.getElementById('adminEmail').focus();
      
      showLoginNotification('📌 Demo credentials filled. Click "Sign in" to continue.', 'info');
    }

    /**
     * Reset password
     */
    function resetPassword(e) {
      e.preventDefault();
      showLoginNotification('📧 Password reset link sent to your email', 'info');
    }

    /**
     * Show notification
     */
    function showLoginNotification(message, type = 'info') {
      const notification = document.getElementById('loginNotification');
      notification.textContent = message;
      notification.className = `notification show ${type}`;
      
      if (type !== 'success') {
        setTimeout(() => {
          notification.classList.remove('show');
        }, 4000);
      }
    }

    /**
     * Check if already logged in
     */
    window.addEventListener('load', () => {
      const adminToken = localStorage.getItem('adminToken');
      if (adminToken) {
        window.location.href = 'admin-classroom.html';
      }
      
      // Restore remembered email
      const rememberEmail = localStorage.getItem('rememberEmail');
      if (rememberEmail) {
        document.getElementById('adminEmail').value = rememberEmail;
        document.getElementById('rememberMe').checked = true;
      }
    });
  </script>
</body>
</html>
